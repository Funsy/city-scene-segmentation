project_name: camvid_city_scene_segmentation
seed: 42
device: cuda

data:
  root: data/camvid
  image_size: 512
  num_workers: 4
  prefetch_factor: 4
  ignore_index: 255
  limit_train_samples: null
  limit_val_samples: null
  limit_test_samples: null

training:
  epochs: 30
  batch_size: 12
  learning_rate: 0.0003
  weight_decay: 0.00001
  amp: true
  early_stopping_patience: 7

models:
  unet_resnet18:
    architecture: Unet
    encoder_name: resnet18
    encoder_weights: imagenet
  fpn_resnet18:
    architecture: FPN
    encoder_name: resnet18
    encoder_weights: imagenet
  deeplabv3plus_resnet18:
    architecture: DeepLabV3Plus
    encoder_name: resnet18
    encoder_weights: imagenet
  pspnet_resnet18:
    architecture: PSPNet
    encoder_name: resnet18
    encoder_weights: imagenet
  linknet_resnet18:
    architecture: Linknet
    encoder_name: resnet18
    encoder_weights: imagenet

outputs:
  run_dir: runs
  history_file: runs/inference_history.jsonl
